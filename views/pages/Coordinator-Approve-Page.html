<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Approve Requests - Army Detachment Gear</title>

  <link rel="stylesheet" href="/styles/css/Coordinator-Approve-Page.css">
</head>

<body data-page="coordinatorApprove">

  <div class="wrap">

    <header>
      <h1>Approve Member Requests</h1>
      <div class="note" id="staffInfo">Signed in: Coordinator</div>
    </header>

    <section class="card" aria-label="Pending requests">

      <p class="note">
       Review each request. Kits are <strong>all-inclusive</strong> and matched based on location/environment + weather/temperature.
      </p>

      <table aria-label="Requests table">
        <thead>
          <tr>
            <th>Request ID</th>
            <th>Activity</th>
            <th>Kit</th>
            <th>Pickup Date</th>
            <th>Status</th>
            <th style="width:220px">Actions</th>
          </tr>
        </thead>

        <!-- Dynamic rows inserted here -->
        <tbody id="requestsTableBody">
        </tbody>

      </table>
    </section>
  </div>

  <script src="/js/JavaScript.js"></script>
</body>
</html>
